<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal New Tab ✨</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="pink-theme.css" />
    <link rel="stylesheet" href="night-theme.css" />
  </head>
  <body class="night">
    <header>
      <h1>Asmara Personal New Tab</h1>
      <a
        href="https://gemini.google.com/app?utm_source=app_launcher&utm_medium=owned&utm_campaign=base_all"
        class="profile-icon"
        title="Personal Assistant"
        target="_blank"
        >♊</a
      >
    </header>

    <div class="main-container">
      <button class="theme-toggle" id="theme-toggle" title="Ganti Tema">
        🌙
      </button>

      <div id="clock"></div>
      <div id="greeting">Selamat Pagi! 🌅</div>

      <section class="search-container">
        <span>🔍</span>
        <input
          type="text"
          id="search-input"
          placeholder="Search Google or type a URL"
        />
      </section>
    </div>

    <div class="link-container">
      <div class="link-header">
        <h2>Quick Links</h2>
        <button id="add-link-btn">➕ Add Link</button>
      </div>

      <ul class="link-list"></ul>
    </div>

    <div class="modal-overlay" id="modal-overlay">
      <div class="link-modal">
        <h3>Tambah Link Cepat</h3>
        <form id="add-link-form">
          <input
            type="text"
            id="link-name-input"
            placeholder="Nama (misal: YouTube)"
            required
          />
          <input
            type="url"
            id="link-url-input"
            placeholder="URL (misal: https://www.youtube.com)"
            required
          />
          <div class="modal-actions">
            <button type="submit" id="save-link-btn">Simpan</button>
            <button type="button" id="cancel-link-btn" class="cancel-btn">
              Batal
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
